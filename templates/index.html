<!DOCTYPE html>
<html>
<head>
    <title>Resume Analyzer</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            text-align:center;
            margin-top:50px;
            background:#f4f4f4;
        }

        h1{
            color:#333;
        }

        form{
            background:white;
            width:400px;
            margin:auto;
            padding:20px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        button{
            background:#007bff;
            color:white;
            border:none;
            padding:10px 20px;
            margin-top:10px;
            border-radius:5px;
            cursor:pointer;
        }

    </style>

</head>

<body>

    <h1>Resume Analyzer</h1>

    <form action="/upload" method="POST" enctype="multipart/form-data">

        <input type="file" name="resume" required>

        <br><br>

        <button type="submit">Analyze Resume</button>

    </form>

</body>
</html>
